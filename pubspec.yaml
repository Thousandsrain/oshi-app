name: oshi_app
description: "チェキ管理アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.1
  path_provider: ^2.1.4
  archive: ^3.6.1
  file_picker: ^8.1.2
  image: ^4.3.0
  flutter_edge_detection: ^1.0.3
  opencv_dart: ^1.4.3
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21